<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Golampi Compiler</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --surface2:  #21262d;
    --border:    #30363d;
    --accent:    #58a6ff;
    --green:     #3fb950;
    --red:       #f85149;
    --yellow:    #d29922;
    --purple:    #bc8cff;
    --orange:    #e3882a;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --font-mono: 'JetBrains Mono', monospace;
    --font-ui:   'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-mono);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TITLEBAR ── */
  .titlebar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }

  .titlebar h1 {
    font-family: var(--font-ui);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--accent), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  /* ── TOOLBAR ── */
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface2);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover {
    background: var(--border);
    border-color: var(--muted);
  }

  /* Botón Compilar (antes era Ejecutar, ahora naranja/amarillo para diferenciarlo) */
  .btn-compile {
    background: var(--orange);
    border-color: var(--orange);
    color: #000;
    font-weight: 700;
  }

  .btn-compile:hover {
    background: #f5a142;
    box-shadow: 0 0 12px rgba(227,136,42,0.4);
  }

  .btn-compile.loading {
    background: var(--yellow);
    border-color: var(--yellow);
    animation: blink 0.6s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.7; }
  }

  .btn-clear { color: var(--muted); }
  .btn-clear:hover { color: var(--text); }

  /* ── MAIN LAYOUT ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 360px;
    grid-template-rows: 1fr 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* ── PANELS ── */
  .panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }

  .panel-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .panel-header span.dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }

  /* ── EDITOR ── */
  .editor-panel {
    grid-column: 1;
    grid-row: 1 / 3;
  }

  textarea#code {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: none;
    outline: none;
    padding: 16px 20px;
    font-family: var(--font-mono);
    font-size: 13.5px;
    line-height: 1.7;
    resize: none;
    width: 100%;
    height: 100%;
    tab-size: 4;
  }

  textarea#code::placeholder { color: var(--muted); }

  /* ── CONSOLA ARM64 ── */
  .console-panel {
    grid-column: 2;
    grid-row: 1;
  }

  pre#output {
    flex: 1;
    background: #010409;
    /* ARM64 se muestra en color diferente al resultado de ejecución del P1 */
    color: #79c0ff;
    font-family: var(--font-mono);
    font-size: 11.5px;
    line-height: 1.6;
    padding: 14px 16px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }

  pre#output .err-line  { color: var(--red); }
  pre#output .ok-line   { color: var(--green); }

  /* ── PANEL DE REPORTES ── */
  .reports-panel {
    grid-column: 2;
    grid-row: 2;
  }

  .reports-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 14px;
    overflow-y: auto;
    flex: 1;
  }

  .report-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }

  .report-btn:hover {
    border-color: var(--accent);
    background: rgba(88,166,255,0.07);
  }

  .report-btn .ricon  { font-size: 18px; width: 28px; text-align: center; }
  .report-btn .rlabel { flex: 1; }

  .report-btn .rlabel strong {
    display: block;
    color: var(--text);
    font-size: 12px;
  }

  .report-btn .rlabel small {
    color: var(--muted);
    font-size: 10px;
  }

  .report-btn.r-arm64  { --rc: var(--orange); }
  .report-btn.r-errors { --rc: var(--red); }
  .report-btn.r-symbols{ --rc: var(--purple); }

  .report-btn:hover .ricon { filter: drop-shadow(0 0 4px var(--rc)); }

  /* ── ERROR BADGE ── */
  .error-count {
    background: var(--red);
    color: #fff;
    border-radius: 20px;
    font-size: 10px;
    padding: 1px 7px;
    font-weight: 700;
    display: none;
  }

  /* ── STATUSBAR ── */
  .statusbar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 4px 16px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 20px;
    align-items: center;
    flex-shrink: 0;
  }

  .statusbar span { display: flex; align-items: center; gap: 5px; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<!-- TITLEBAR -->
<div class="titlebar">
  <h1>Golampi Compiler</h1>
  <div style="position:absolute;right:20px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)">
    <div class="status-dot"></div>
    <span>ARM64</span>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <button class="btn" onclick="nuevoArchivo()">🗋 Nuevo</button>
  <button class="btn" onclick="cargarArchivo()">📂 Abrir</button>
  <button class="btn" onclick="guardarCodigo()">💾 Guardar</button>
  <!-- P2: Compilar en lugar de Ejecutar -->
  <button class="btn btn-compile" id="btnCompile" onclick="compilarCodigo()">⚙ Compilar</button>
  <button class="btn btn-clear" onclick="limpiarConsola()">🧹 Limpiar</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- EDITOR -->
  <div class="panel editor-panel">
    <div class="panel-header">
      <span class="dot"></span>
      📝 Editor de Código — Golampi
    </div>
    <textarea id="code" placeholder="// Escribe tu código Golampi aquí...
func main() {
    fmt.Println(&quot;Hola, Golampi Compiler!&quot;)
}"></textarea>
  </div>

  <!-- CONSOLA ARM64 -->
  <div class="panel console-panel">
    <div class="panel-header">
      <span class="dot" style="background:var(--orange)"></span>
      ⚙️ Código ARM64 Generado
      <span id="errorBadge" class="error-count">0 errores</span>
    </div>
    <!-- P2: muestra el ensamblador generado, no el output del programa -->
    <pre id="output">// El código ARM64 generado aparecerá aquí...</pre>
  </div>

  <!-- REPORTES -->
  <div class="panel reports-panel">
    <div class="panel-header">
      <span class="dot" style="background:var(--purple)"></span>
      📊 Reportes
    </div>
    <div class="reports-grid">

      <!-- P2: Descargar el .s generado (nuevo) -->
      <button class="report-btn r-arm64" onclick="descargarArm64()">
        <span class="ricon">💾</span>
        <span class="rlabel">
          <strong>Descargar ARM64</strong>
          <small>Archivo .s ensamblador generado</small>
        </span>
        <span>↓</span>
      </button>

      <button class="report-btn r-errors" onclick="descargarReporte('errores')">
        <span class="ricon">⚠️</span>
        <span class="rlabel">
          <strong>Ver / Descargar Errores</strong>
          <small>Léxicos, sintácticos, semánticos</small>
        </span>
        <span>↓</span>
      </button>

      <button class="report-btn r-symbols" onclick="descargarReporte('simbolos')">
        <span class="ricon">🔍</span>
        <span class="rlabel">
          <strong>Tabla de Símbolos</strong>
          <small>Variables, funciones, constantes</small>
        </span>
        <span>↓</span>
      </button>

    </div>
  </div>
</div>

<!-- STATUSBAR -->
<div class="statusbar">
  <span id="statusMsg">⚡ Golampi Compiler listo</span>
  <span style="margin-left:auto" id="statusErrors"></span>
</div>

<script>
// ── Estado global ────────────────────────────────────────────────────────────
window._ultimosErrores  = [];
window._ultimosSimbolos = [];
window._ultimoAsm       = "";   // P2: código ARM64 generado

// ── Nuevo / Limpiar ──────────────────────────────────────────────────────────
function nuevoArchivo() {
  document.getElementById("code").value = "";
  document.getElementById("output").textContent = "// El código ARM64 generado aparecerá aquí...";
  window._ultimosErrores  = [];
  window._ultimosSimbolos = [];
  window._ultimoAsm       = "";
  setStatus("🗋 Editor limpiado", false);
  updateBadge(0);
}

// ── Cargar archivo ───────────────────────────────────────────────────────────
function cargarArchivo() {
  const input = document.createElement("input");
  input.type  = "file";
  input.accept = ".txt,.golampi,.gol";
  input.onchange = e => {
    const file   = e.target.files[0];
    const reader = new FileReader();
    reader.onload = () => {
      document.getElementById("code").value = reader.result;
      setStatus("📂 Archivo cargado: " + file.name, false);
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── Guardar código fuente ────────────────────────────────────────────────────
function guardarCodigo() {
  const code = document.getElementById("code").value;
  descargar(code, "codigo.golampi.txt", "text/plain");
  setStatus("💾 Código guardado", false);
}

// ── COMPILAR (P2: reemplaza runCode del P1) ──────────────────────────────────
function compilarCodigo() {
  const code = document.getElementById("code").value;
  if (!code.trim()) {
    setStatus("⚠️ El editor está vacío", true);
    return;
  }

  const btn = document.getElementById("btnCompile");
  btn.classList.add("loading");
  btn.textContent = "⏳ Compilando...";

  // Limpiar consola antes de compilar
  document.getElementById("output").textContent = "⏳ Compilando...\n";
  setStatus("⏳ Compilando código Golampi → ARM64...", false);

  fetch("../BACKEND/Codigo/Execute.php", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: "code=" + encodeURIComponent(code)
  })
  .then(res => res.json())
  .then(data => {
    btn.classList.remove("loading");
    btn.textContent = "⚙ Compilar";

    window._ultimosErrores  = data.errors  || [];
    window._ultimosSimbolos = data.symbols || [];
    window._ultimoAsm       = data.asm     || "";

    const errCount = window._ultimosErrores.length;

    // ── Mostrar en consola ────────────────────────────────────────────────
    let consolaTexto = "";

    if (window._ultimoAsm && window._ultimoAsm !== "") {
      // Compilación exitosa (o con warnings): mostrar ARM64
      consolaTexto = window._ultimoAsm;

      if (errCount > 0) {
        consolaTexto += "\n\n// ── ADVERTENCIAS / ERRORES ──────────────────\n";
        window._ultimosErrores.forEach(err => {
          consolaTexto += `// [${err.type}] Línea ${err.line}, Col ${err.column}: ${err.description}\n`;
        });
      }
    } else {
      // No se generó código: mostrar errores
      consolaTexto = "// ── Compilación fallida ──────────────────────\n\n";
      if (errCount > 0) {
        window._ultimosErrores.forEach(err => {
          consolaTexto += `// [${err.type}] Línea ${err.line}, Col ${err.column}: ${err.description}\n`;
        });
      } else {
        consolaTexto += "// Error desconocido durante la compilación.\n";
      }
    }

    document.getElementById("output").textContent = consolaTexto;
    updateBadge(errCount);

    if (errCount > 0) {
      setStatus(`⚙ Compilación completada — ${errCount} error(es)`, true);
    } else {
      setStatus("✅ Compilación exitosa — ARM64 generado", false);
    }
  })
  .catch(error => {
    btn.classList.remove("loading");
    btn.textContent = "⚙ Compilar";
    document.getElementById("output").textContent = "❌ Error de conexión: " + error;
    setStatus("❌ Error al compilar", true);
  });
}

// ── Limpiar consola ──────────────────────────────────────────────────────────
function limpiarConsola() {
  document.getElementById("output").textContent = "// El código ARM64 generado aparecerá aquí...";
  setStatus("🧹 Consola limpiada", false);
  updateBadge(0);
}

// ── Descargar ARM64 (.s) ─────────────────────────────────────────────────────
function descargarArm64() {
  if (!window._ultimoAsm || window._ultimoAsm.trim() === "") {
    setStatus("⚠️ No hay código ARM64 generado aún", true);
    return;
  }
  descargar(window._ultimoAsm, "programa.s", "text/plain");
  setStatus("💾 Archivo ARM64 descargado", false);
}

// ── Reportes: Errores y Símbolos ─────────────────────────────────────────────
function descargarReporte(tipo) {

  if (tipo === "errores") {
    const errors = window._ultimosErrores || [];
    let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <style>
      body{font-family:monospace;background:#0d1117;color:#e6edf3;padding:30px}
      h2{color:#58a6ff;margin-bottom:20px}
      table{width:100%;border-collapse:collapse}
      th{background:#161b22;color:#8b949e;padding:10px 14px;text-align:left;
         border-bottom:2px solid #30363d;font-size:11px;text-transform:uppercase}
      td{padding:10px 14px;border-bottom:1px solid #21262d;font-size:13px}
      tr:hover td{background:#161b22}
      .lexico{color:#d29922} .sintactico{color:#f85149} .semantico{color:#bc8cff}
      .ensamblaje{color:#e3882a} .enlace{color:#e3882a}
      .empty{text-align:center;color:#8b949e;padding:30px}
    </style></head><body>
    <h2>⚠️ Tabla de Errores — Golampi Compiler</h2>
    <table><tr><th>#</th><th>Tipo</th><th>Descripción</th><th>Línea</th><th>Columna</th></tr>`;

    if (errors.length === 0) {
      html += `<tr><td colspan="5" class="empty">✓ Sin errores encontrados</td></tr>`;
    } else {
      errors.forEach(e => {
        const cls = (e.type || "").toLowerCase().replace(/[^a-z]/g, "");
        html += `<tr>
          <td>${e.id}</td>
          <td class="${cls}">${e.type}</td>
          <td>${e.description}</td>
          <td>${e.line}</td>
          <td>${e.column}</td>
        </tr>`;
      });
    }
    html += `</table></body></html>`;
    descargarHtml(html, "errores.html");
    return;
  }

  if (tipo === "simbolos") {
    const symbols = window._ultimosSimbolos || [];
    let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <style>
      body{font-family:monospace;background:#0d1117;color:#e6edf3;padding:30px}
      h2{color:#bc8cff;margin-bottom:20px}
      table{width:100%;border-collapse:collapse}
      th{background:#161b22;color:#8b949e;padding:10px 14px;text-align:left;
         border-bottom:2px solid #30363d;font-size:11px;text-transform:uppercase}
      td{padding:10px 14px;border-bottom:1px solid #21262d;font-size:13px}
      tr:hover td{background:#161b22}
      .empty{text-align:center;color:#8b949e;padding:30px}
    </style></head><body>
    <h2>🔍 Tabla de Símbolos — Golampi Compiler</h2>
    <table>
      <tr><th>Identificador</th><th>Tipo</th><th>Ámbito</th>
          <th>Valor</th><th>Línea</th><th>Columna</th></tr>`;

    if (symbols.length === 0) {
      html += `<tr><td colspan="6" class="empty">Sin símbolos registrados</td></tr>`;
    } else {
      symbols.forEach(s => {
        html += `<tr>
          <td>${s.identifier}</td><td>${s.type}</td><td>${s.scope}</td>
          <td>${s.value}</td><td>${s.line}</td><td>${s.column}</td>
        </tr>`;
      });
    }
    html += `</table></body></html>`;
    descargarHtml(html, "simbolos.html");
    return;
  }
}

// ── Helpers de descarga ──────────────────────────────────────────────────────
function descargarHtml(html, filename) {
  descargar(html, filename, "text/html");
}

function descargar(contenido, filename, mime) {
  const blob = new Blob([contenido], { type: mime });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
}

// ── Badge de errores ─────────────────────────────────────────────────────────
function updateBadge(count) {
  const badge       = document.getElementById("errorBadge");
  const statusErrors = document.getElementById("statusErrors");
  if (count > 0) {
    badge.style.display = "inline";
    badge.textContent   = count + (count === 1 ? " error" : " errores");
    statusErrors.textContent = "⚠️ " + count + " error(es)";
    statusErrors.style.color = "var(--red)";
  } else {
    badge.style.display = "none";
    statusErrors.textContent = "✓ Sin errores";
    statusErrors.style.color = "var(--green)";
  }
}

// ── Status bar ───────────────────────────────────────────────────────────────
function setStatus(msg, isError) {
  const el = document.getElementById("statusMsg");
  el.textContent  = msg;
  el.style.color  = isError ? "var(--red)" : "var(--muted)";
}
</script>
</body>
</html>
